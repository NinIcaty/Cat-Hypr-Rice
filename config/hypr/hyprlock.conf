background {
    monitor =
    path = @HYPRCAT_CONFIG_DIR@/wallpapers/NewMainDark.png
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

general {
    hide_cursor = true
    grace = 2
}

label {
    monitor =
    text = $TIME
    color = rgba(cad6ffff)
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = rgba(a6adc8ff)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 90
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:30000] @HYPRCAT_DATA_DIR@/scripts/battery-percent.sh
    color = rgba(89dcebff)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 52
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.24
    dots_center = true
    outer_color = rgba(89dcebff)
    inner_color = rgba(1e1e2eee)
    font_color = rgba(cdd6f4ff)
    placeholder_text = Password...
    hide_input = false
    check_color = rgba(a6e3a1ff)
    fail_color = rgba(f38ba8ff)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgba(f9e2afff)
    position = 0, -20
    halign = center
    valign = center
}
