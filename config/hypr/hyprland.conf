# Theme entrypoint loaded from ~/.config/hypr/hyprland.conf by install.sh.
source = ~/.config/hypr-material3/hypr/theme.conf
source = ~/.config/hypr-material3/hypr/apps.conf
source = ~/.config/hypr-material3/hypr/keybinds.conf
source = ~/.config/hypr-material3/hypr/autostart.conf

monitor=,preferred,auto,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
    sensitivity = 0
}

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(cad6ffff) rgba(89dcebff) 45deg
    col.inactive_border = rgba(6c7086ff)
    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 18
    active_opacity = 1.0
    inactive_opacity = 0.96
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 2
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 18
        render_power = 3
        color = rgba(00000055)
    }
}

animations {
    enabled = true

    bezier = material, 0.2, 0.0, 0, 1.0
    animation = windows, 1, 5, material, popin 80%
    animation = windowsOut, 1, 4, material, popin 80%
    animation = border, 1, 6, material
    animation = fade, 1, 5, material
    animation = workspaces, 1, 5, material, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = 0
}

windowrule = match:class .*, suppress_event maximize
